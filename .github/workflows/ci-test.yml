name: CI Test

on:
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

concurrency:
  group: ci-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      common: ${{ steps.filter.outputs.common }}
      user: ${{ steps.filter.outputs.user }}
      order: ${{ steps.filter.outputs.order }}
      payment: ${{ steps.filter.outputs.payment }}
      product: ${{ steps.filter.outputs.product }}
      settlement: ${{ steps.filter.outputs.settlement }}
      file: ${{ steps.filter.outputs.file }}
      global: ${{ steps.filter.outputs.global }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            common:
              - 'common/**'

            user:
              - 'service/user/**'

            order:
              - 'service/order/**'

            payment:
              - 'service/payment/**'

            product:
              - 'service/product/**'

            settlement:
              - 'service/settlement/**'

            file:
              - 'service/file/**'

            global:
              - 'settings.gradle'
              - 'settings.gradle.kts'
              - 'build.gradle'
              - 'build.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - 'config/**'
              - '.github/workflows/**'

            docs_only:
              - '**/*.md'
              - 'docs/**'

  test:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.docs_only != 'true' || (
      needs.detect-changes.outputs.common == 'true' ||
      needs.detect-changes.outputs.user == 'true' ||
      needs.detect-changes.outputs.order == 'true' ||
      needs.detect-changes.outputs.payment == 'true' ||
      needs.detect-changes.outputs.product == 'true' ||
      needs.detect-changes.outputs.settlement == 'true' ||
      needs.detect-changes.outputs.file == 'true' ||
      needs.detect-changes.outputs.global == 'true'
      ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decide test scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ needs.detect-changes.outputs.common }}" == "true" || "${{ needs.detect-changes.outputs.global }}" == "true" ]]; then
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "tasks=clean test" >> $GITHUB_OUTPUT
            exit 0
          fi

          TASKS=""

          if [[ "${{ needs.detect-changes.outputs.user }}" == "true" ]]; then
            TASKS="$TASKS :service:user:test"
          fi

          if [[ "${{ needs.detect-changes.outputs.order }}" == "true" ]]; then
            TASKS="$TASKS :service:order:test"
          fi

          if [[ "${{ needs.detect-changes.outputs.payment }}" == "true" ]]; then
            TASKS="$TASKS :service:payment:test"
          fi

          if [[ "${{ needs.detect-changes.outputs.product }}" == "true" ]]; then
            TASKS="$TASKS :service:product:test"
          fi

          if [[ "${{ needs.detect-changes.outputs.settlement }}" == "true" ]]; then
            TASKS="$TASKS :service:settlement:test"
          fi

          if [[ "${{ needs.detect-changes.outputs.file }}" == "true" ]]; then
            TASKS="$TASKS :service:file:test"
          fi

          TASKS=$(echo "$TASKS" | xargs)

          if [[ -z "$TASKS" ]]; then
            echo "tasks=" >> $GITHUB_OUTPUT
          else
            echo "tasks=$TASKS" >> $GITHUB_OUTPUT
          fi

      - name: Show selected tasks
        run: echo "Selected tasks => ${{ steps.scope.outputs.tasks }}"

      - name: Run tests
        if: ${{ steps.scope.outputs.tasks != '' }}
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew ${{ steps.scope.outputs.tasks }} --no-daemon

      - name: Skip test message
        if: ${{ steps.scope.outputs.tasks == '' }}
        run: echo "No testable module changes detected. Skipping tests."

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/test
            **/build/test-results/test