name: "Chore"
description: "기타 작업"
title: "chore: "
labels: ["chore"]
body:
  - type: input
    id: package_name
    attributes:
      label: "Package name"
      description: "작업 대상 모듈/패키지명"
      placeholder: "common"
    validations:
      required: true

  - type: input
    id: branch_keyword
    attributes:
      label: "Branch keyword"
      description: "브랜치 기능 키워드"
      placeholder: "ci-update"
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: "작업 내용"
      description: "잡일/정리/설정 변경 등"
      placeholder: |
        예)
        - gradle 버전 업데이트
        - CI 캐시 정책 변경
        - 문서 정리
    validations:
      required: true