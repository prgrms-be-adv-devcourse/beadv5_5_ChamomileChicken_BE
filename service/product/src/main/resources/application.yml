server.port: 9004
spring:
  application: name:product
  #  datasource:
  #    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:backend5}
  #    username: ${DB_USERNAME:postgres}
  #    password: ${DB_PASSWORD:postgres}
  #    driver-class-name: org.postgresql.Driver

  datasource:
    url: jdbc:h2:tcp://localhost/~/test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true # 테스트 sql 삽입용
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  springdoc:
    swagger-ui:
      path: /swagger-ui.html
    api-docs:
      path: /v3/api-docs
      version: OPENAPI_3_0
