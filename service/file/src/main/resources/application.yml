server:
  port: 9000

spring:
  application:
    name: file

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  cloud:
    aws:
      s3:
        bucket: test-bucket
      region:
        static: ap-northeast-2
      credentials:
        access-key: test-access-key
        secret-key: test-secret-key

jwt:
  secret: test-jwt-secret-key
  access-token-validity: 1800000
  refresh-token-validity: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_0

logging:
  level:
    jabaclass: DEBUG
    org.springframework.web: DEBUG