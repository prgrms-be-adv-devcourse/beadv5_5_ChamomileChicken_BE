server.port: 9005
spring:
  application:
    name: order

  datasource:
    url: jdbc:h2:tcp://localhost/~/jabaclass-test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz123456}
  access-token-validity: 3600000
  refresh-token-validity: 604800000
external:
  deposits:
    base-url: http://localhost:9003
  products:
    base-url: http://localhost:9004

logging:
  level:
    jabaclass: DEBUG
    org.springframework.web: DEBUG
