<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 완료 - Jaba</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .box { background: white; border-radius: 8px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        .check { font-size: 60px; margin-bottom: 16px; }
        h2 { color: #2ecc71; margin: 0 0 12px; }
        .info { color: #555; margin-bottom: 8px; }
        a { display: inline-block; margin-top: 24px; padding: 10px 24px; background: #4a90e2; color: white; text-decoration: none; border-radius: 4px; }
        a:hover { background: #357abd; }
    </style>
</head>
<body>
<div class="box">
    <div class="check">✅</div>
    <h2>결제가 완료되었습니다</h2>
    <p class="info">주문 번호: <strong th:text="${orderId}">-</strong></p>
    <p class="info">결제 금액: <strong th:text="${#numbers.formatDecimal(amount, 0, 'COMMA', 0, 'POINT')} + '원'">-</strong></p>
    <a href="/products">클래스 더 보기</a>
</div>
</body>
</html>
