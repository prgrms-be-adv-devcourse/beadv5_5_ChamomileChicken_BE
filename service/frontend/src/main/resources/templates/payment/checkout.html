<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 - Jaba</title>
    <script src="https://js.tosspayments.com/v1"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 40px 20px; background: #f5f5f5; }
        .box { background: white; border-radius: 8px; padding: 28px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        h2 { margin: 0 0 20px; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .row:last-of-type { border-bottom: none; font-weight: bold; font-size: 18px; }
        .pay-btn { margin-top: 24px; width: 100%; padding: 14px; background: #4a90e2; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .pay-btn:hover { background: #357abd; }
    </style>
</head>
<body>
<div class="box">
    <h2>결제 정보 확인</h2>
    <div class="row">
        <span>주문 번호</span>
        <span th:text="${orderId}">-</span>
    </div>
    <div class="row">
        <span>예치금 사용</span>
        <span th:text="${#numbers.formatDecimal(depositAmount, 0, 'COMMA', 0, 'POINT')} + '원'">-</span>
    </div>
    <div class="row">
        <span>최종 결제 금액</span>
        <span th:text="${#numbers.formatDecimal(amount, 0, 'COMMA', 0, 'POINT')} + '원'">-</span>
    </div>
    <button class="pay-btn" onclick="startPayment()">결제하기</button>
</div>

<script th:inline="javascript">
    const tossClientKey = /*[[${tossClientKey}]]*/ '';
    const successUrl    = /*[[${tossSuccessUrl}]]*/ '';
    const failUrl       = /*[[${tossFailUrl}]]*/ '';
    const orderId       = /*[[${orderId}]]*/ '';
    const productId     = /*[[${productId}]]*/ '';
    const amount        = /*[[${amount}]]*/ 0;
    const depositAmount = /*[[${depositAmount}]]*/ 0;

    const tossPayments = TossPayments(tossClientKey);

    async function startPayment() {
        // 1. BFF를 통해 payment prepare 호출
        const res = await fetch('/payment/prepare', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                orderId: orderId,
                productId: productId,
                paymentMethod: 'TOSS',
                paymentAmount: amount,
                depositAmount: depositAmount
            })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert('결제 준비 실패: ' + (err.error || res.status));
            return;
        }

        // 2. Toss 결제 위젯 실행
        tossPayments.requestPayment('카드', {
            amount: amount,
            orderId: orderId,
            orderName: '클래스 예약',
            successUrl: successUrl,
            failUrl: failUrl
        });
    }
</script>
</body>
</html>
