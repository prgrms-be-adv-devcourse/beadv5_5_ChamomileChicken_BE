<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common-head :: head('예치금 충전 - Jaba')}"></head>
<body class="bg-gray-50 dark:bg-[#121212] text-gray-900 dark:text-white antialiased min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white dark:bg-[#1e1e1e] border border-gray-200 dark:border-gray-800 rounded-2xl p-8 shadow-2xl">
    <div class="flex items-center justify-between gap-3 mb-8">
        <div class="flex items-center gap-3">
            <a href="/mypage" class="text-gray-400 dark:text-gray-500 hover:text-gray-900 dark:hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <h2 class="text-xl font-bold">예치금 충전</h2>
        </div>
        <button onclick="toggleTheme()" title="테마 변경"
                class="p-2 rounded-lg border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
            <svg class="w-4 h-4 theme-icon-light" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            <svg class="w-4 h-4 theme-icon-dark hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        </button>
    </div>

    <div class="bg-gray-50 dark:bg-[#121212] rounded-xl p-4 mb-6 border border-gray-200 dark:border-gray-800">
        <p class="text-xs text-gray-400 dark:text-gray-500 mb-1">현재 예치금 잔액</p>
        <p class="text-2xl font-bold"
           th:text="'₩' + ${#numbers.formatDecimal(currentDeposit, 0, 'COMMA', 0, 'POINT')}">₩0</p>
    </div>

    <div id="errorMsg" class="hidden bg-red-50 dark:bg-red-900/30 border border-red-300 dark:border-red-800 text-red-700 dark:text-red-400 px-4 py-3 rounded-lg mb-5 text-sm"></div>

    <div class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-3">충전 금액 선택</label>
            <div class="grid grid-cols-3 gap-2 mb-3">
                <button onclick="setAmount(10000)" class="amount-btn py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-gray-900 dark:hover:border-white hover:text-gray-900 dark:hover:text-white transition-colors">1만원</button>
                <button onclick="setAmount(30000)" class="amount-btn py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-gray-900 dark:hover:border-white hover:text-gray-900 dark:hover:text-white transition-colors">3만원</button>
                <button onclick="setAmount(50000)" class="amount-btn py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-gray-900 dark:hover:border-white hover:text-gray-900 dark:hover:text-white transition-colors">5만원</button>
                <button onclick="setAmount(100000)" class="amount-btn py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-gray-900 dark:hover:border-white hover:text-gray-900 dark:hover:text-white transition-colors">10만원</button>
                <button onclick="setAmount(300000)" class="amount-btn py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-gray-900 dark:hover:border-white hover:text-gray-900 dark:hover:text-white transition-colors">30만원</button>
                <button onclick="setAmount(500000)" class="amount-btn py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-gray-900 dark:hover:border-white hover:text-gray-900 dark:hover:text-white transition-colors">50만원</button>
            </div>
            <input type="number" id="amountInput" placeholder="직접 입력 (원)" min="1000"
                   class="w-full px-4 py-3 bg-gray-50 dark:bg-[#121212] border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" />
        </div>

        <button onclick="startPayment()"
                class="w-full py-3.5 bg-gray-900 dark:bg-white text-white dark:text-black font-bold rounded-lg text-sm hover:bg-gray-700 dark:hover:bg-gray-200 transition-colors">
            충전하기
        </button>
    </div>
</div>

<script src="https://js.tosspayments.com/v1"></script>
<script th:inline="javascript">
    const tossClientKey  = /*[[${tossClientKey}]]*/ '';
    const successUrl     = /*[[${depositSuccessUrl}]]*/ '';
    const failUrl        = /*[[${depositFailUrl}]]*/ '';
    const userId         = /*[[${userId}]]*/ '';

    const tossPayments = TossPayments(tossClientKey);

    function setAmount(value) {
        document.getElementById('amountInput').value = value;
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    async function startPayment() {
        const amount = parseInt(document.getElementById('amountInput').value);
        if (!amount || amount < 1000) {
            showError('충전 금액은 최소 1,000원 이상이어야 합니다.');
            return;
        }

        try {
            const res = await fetch('/deposit/prepare', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, amount })
            });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.error || '결제 준비에 실패했습니다.');
            }
            const data = await res.json();

            tossPayments.requestPayment('카드', {
                amount: amount,
                orderId: data.depositPaymentsId,
                orderName: '예치금 충전',
                successUrl: successUrl,
                failUrl: failUrl
            });
        } catch (e) {
            showError(e.message);
        }
    }
</script>
</body>
</html>
