<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 목록 - Jaba</title>
    <style>
        body { font-family: sans-serif; max-width: 960px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { margin: 0; }
        .logout-btn { padding: 8px 16px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        .card h3 { margin: 0 0 8px; }
        .card .seller { color: #888; font-size: 13px; margin-bottom: 8px; }
        .card .price { font-size: 18px; font-weight: bold; color: #4a90e2; margin-bottom: 12px; }
        .card a { display: block; text-align: center; padding: 8px; background: #4a90e2; color: white; text-decoration: none; border-radius: 4px; }
        .card a:hover { background: #357abd; }
        .empty { text-align: center; color: #888; padding: 60px; }
    </style>
</head>
<body>
<header>
    <h1>클래스 목록</h1>
    <form th:action="@{/logout}" method="post">
        <button class="logout-btn" type="submit">로그아웃</button>
    </form>
</header>

<div class="grid" th:if="${not #lists.isEmpty(products)}">
    <div class="card" th:each="product : ${products}">
        <h3 th:text="${product.title}">상품명</h3>
        <p class="seller" th:text="'판매자: ' + ${product.sellerName}">판매자</p>
        <p th:text="${product.description}">설명</p>
        <p class="price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '원'">가격</p>
        <a th:href="@{/products/{id}(id=${product.id})}">상세 보기</a>
    </div>
</div>
<div class="empty" th:if="${#lists.isEmpty(products)}">
    <p>등록된 상품이 없습니다.</p>
</div>
</body>
</html>
