<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - Jaba</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 360px; }
        h2 { margin: 0 0 24px; text-align: center; }
        label { display: block; margin-bottom: 4px; font-size: 14px; color: #555; }
        input { width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #357abd; }
        .error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="box">
    <h2>Jaba 로그인</h2>
    <p class="error" th:if="${error}" th:text="${error}"></p>
    <form th:action="@{/login}" th:object="${loginRequest}" method="post">
        <label>이메일</label>
        <input type="email" th:field="*{email}" placeholder="이메일 입력" required />
        <label>비밀번호</label>
        <input type="password" th:field="*{password}" placeholder="비밀번호 입력" required />
        <button type="submit">로그인</button>
    </form>
</div>
</body>
</html>
