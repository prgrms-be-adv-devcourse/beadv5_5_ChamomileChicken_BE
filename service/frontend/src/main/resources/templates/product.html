<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common-head :: head(${product.title} + ' - Jaba')}"></head>
<body class="bg-gray-50 dark:bg-[#121212] text-gray-900 dark:text-white antialiased min-h-screen py-10">

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between mb-8">
        <a href="/products" class="inline-flex items-center text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            목록으로
        </a>
        <button onclick="toggleTheme()" title="테마 변경"
                class="p-2 rounded-lg border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
            <svg class="w-4 h-4 theme-icon-light" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            <svg class="w-4 h-4 theme-icon-dark hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        </button>
    </div>

    <div class="bg-white dark:bg-[#1e1e1e] rounded-2xl p-8 border border-gray-200 dark:border-gray-800 mb-10 shadow-lg">
        <p class="text-sm font-semibold text-blue-600 dark:text-blue-400 mb-2" th:text="'판매자: ' + ${product.sellerName}">판매자</p>
        <h2 class="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-4" th:text="${product.title}">상품명</h2>
        <p class="text-2xl font-bold mb-6" th:text="'₩' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">가격</p>
        <div class="border-t border-gray-100 dark:border-gray-800 pt-6">
            <p class="text-gray-600 dark:text-gray-300 leading-relaxed" th:text="${product.description}">설명</p>
        </div>
    </div>

    <h3 class="text-xl font-bold text-gray-800 dark:text-gray-100 mb-6">예약 가능 일정</h3>

    <div class="bg-white dark:bg-[#1e1e1e] rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-800 shadow-lg" th:if="${not #lists.isEmpty(schedules)}">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm text-gray-600 dark:text-gray-400">
                <thead class="text-xs text-gray-600 dark:text-gray-300 uppercase bg-gray-50 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
                <tr>
                    <th scope="col" class="px-6 py-4 font-medium">날짜</th>
                    <th scope="col" class="px-6 py-4 font-medium">시간</th>
                    <th scope="col" class="px-6 py-4 font-medium">인원</th>
                    <th scope="col" class="px-6 py-4 font-medium">상태</th>
                    <th scope="col" class="px-6 py-4 font-medium text-right">예약</th>
                </tr>
                </thead>
                <tbody>
                <tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-[#252525] transition-colors" th:each="schedule : ${schedules}">
                    <td class="px-6 py-4 whitespace-nowrap text-gray-800 dark:text-gray-200 font-medium" th:text="${schedule.scheduleDt}">날짜</td>
                    <td class="px-6 py-4" th:text="${schedule.startTime} + ' ~ ' + ${schedule.endTime}">시간</td>
                    <td class="px-6 py-4" th:text="${schedule.maxCapacity} + '명'">인원</td>
                    <td class="px-6 py-4">
                        <span class="px-2.5 py-1 rounded-full text-xs font-medium bg-blue-50 dark:bg-blue-900/50 text-blue-600 dark:text-blue-300" th:text="${schedule.status}">상태</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button type="button"
                                th:data-product-id="${product.id}"
                                th:data-schedule-id="${schedule.id}"
                                th:data-schedule-date="${schedule.scheduleDt}"
                                th:data-start-time="${schedule.startTime}"
                                th:data-end-time="${schedule.endTime}"
                                onclick="openOrderModal(this)"
                                class="px-4 py-2 bg-gray-900 dark:bg-white text-white dark:text-black font-bold rounded-lg text-sm hover:bg-gray-700 dark:hover:bg-gray-200 transition disabled:bg-gray-300 dark:disabled:bg-gray-700 disabled:text-gray-400 dark:disabled:text-gray-500 disabled:cursor-not-allowed"
                                th:disabled="${schedule.status != '예약 가능'}">
                            예약하기
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="bg-white dark:bg-[#1e1e1e] border border-gray-200 dark:border-gray-800 rounded-2xl p-12 text-center" th:if="${#lists.isEmpty(schedules)}">
        <p class="text-gray-400 dark:text-gray-500">등록된 일정이 없습니다.</p>
    </div>
</div>

<!-- 예약 모달 -->
<div id="orderModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-[#1e1e1e] rounded-2xl p-8 w-full max-w-sm shadow-2xl border border-gray-200 dark:border-gray-800">
        <h3 class="text-xl font-bold text-gray-800 dark:text-gray-100 mb-6">예약 확인</h3>

        <!-- 선택한 일정 정보 -->
        <div class="space-y-2 mb-6 p-4 bg-gray-50 dark:bg-[#121212] rounded-xl">
            <p class="text-sm text-gray-500 dark:text-gray-400">선택한 일정</p>
            <p id="modal-schedule-date" class="font-semibold text-gray-800 dark:text-gray-100"></p>
            <p id="modal-schedule-time" class="text-sm text-gray-600 dark:text-gray-300"></p>
        </div>

        <!-- 예치금 섹션 -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm text-gray-500 dark:text-gray-400">보유 예치금</span>
                <span class="font-bold text-blue-600 dark:text-blue-400" id="modal-deposit-balance"
                      th:text="'₩' + ${#numbers.formatDecimal(depositBalance, 0, 'COMMA', 0, 'POINT')}">₩0</span>
            </div>
            <label for="modal-deposit-input" class="block text-sm text-gray-500 dark:text-gray-400 mb-1">사용할 예치금 (₩)</label>
            <input type="number" id="modal-deposit-input" min="0"
                   th:max="${depositBalance}"
                   value="0"
                   class="w-full border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-2 bg-white dark:bg-[#121212] text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="0" />
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">0 입력 시 전액 카드로 결제됩니다.</p>
        </div>

        <!-- 주문 폼 -->
        <form id="modal-order-form" action="/orders" method="post">
            <input type="hidden" name="productId" id="modal-product-id" />
            <input type="hidden" name="scheduleId" id="modal-schedule-id" />
            <input type="hidden" name="quantity" value="1" />
            <input type="hidden" name="depositAmount" id="modal-deposit-amount" value="0" />
            <div class="flex gap-3">
                <button type="button" onclick="closeOrderModal()"
                        class="flex-1 py-3 border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 font-medium rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition">
                    취소
                </button>
                <button type="submit"
                        class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition shadow-[0_0_15px_rgba(37,99,235,0.3)]">
                    예약하기
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function openOrderModal(btn) {
        document.getElementById('modal-product-id').value = btn.dataset.productId;
        document.getElementById('modal-schedule-id').value = btn.dataset.scheduleId;
        document.getElementById('modal-schedule-date').textContent = btn.dataset.scheduleDate;
        document.getElementById('modal-schedule-time').textContent = btn.dataset.startTime + ' ~ ' + btn.dataset.endTime;
        document.getElementById('modal-deposit-input').value = '0';
        document.getElementById('orderModal').classList.remove('hidden');
    }

    function closeOrderModal() {
        document.getElementById('orderModal').classList.add('hidden');
    }

    document.getElementById('modal-order-form').addEventListener('submit', function() {
        document.getElementById('modal-deposit-amount').value =
            document.getElementById('modal-deposit-input').value || '0';
    });
</script>

</body>
</html>
