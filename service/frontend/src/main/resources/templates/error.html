<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>오류 - Jaba</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .box { background: white; border-radius: 8px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; max-width: 480px; }
        h2 { color: #e74c3c; margin: 0 0 12px; }
        .msg { color: #666; font-size: 13px; word-break: break-all; margin-bottom: 24px; }
        a { padding: 10px 24px; background: #4a90e2; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
<div class="box">
    <h2>오류가 발생했습니다</h2>
    <p class="msg" th:text="${errorMessage}">알 수 없는 오류</p>
    <a href="/products">목록으로</a>
</div>
</body>
</html>
