<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common-head :: head('마이페이지 - Jaba')}"></head>
<body class="bg-gray-50 dark:bg-[#121212] text-gray-900 dark:text-white antialiased min-h-screen">

<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <!-- 헤더 -->
    <header class="flex justify-between items-center mb-10 pb-4 border-b border-gray-200 dark:border-gray-800">
        <a href="/products" class="text-2xl font-bold tracking-tight">Jaba 클래스</a>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" title="테마 변경"
                    class="p-2 rounded-lg border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <svg class="w-4 h-4 theme-icon-light" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg class="w-4 h-4 theme-icon-dark hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>
            <span class="text-sm text-gray-500 dark:text-gray-400">마이페이지</span>
            <form th:action="@{/logout}" method="post">
                <button class="bg-transparent border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" type="submit">
                    로그아웃
                </button>
            </form>
        </div>
    </header>

    <!-- 사용자 정보 + 예치금 -->
    <div th:if="${userInfoError}" class="bg-red-50 dark:bg-red-900/30 border border-red-300 dark:border-red-800 text-red-700 dark:text-red-400 px-4 py-3 rounded-lg mb-6 text-sm"
         th:text="${userInfoError}"></div>

    <div th:if="${userInfo}" class="bg-white dark:bg-[#1e1e1e] border border-gray-200 dark:border-gray-800 rounded-2xl p-6 mb-8">
        <h2 class="text-lg font-bold mb-5">내 정보</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
            <div>
                <p class="text-xs text-gray-400 dark:text-gray-500 mb-1">이름</p>
                <p class="text-sm font-medium" th:text="${userInfo.name}">-</p>
            </div>
            <div>
                <p class="text-xs text-gray-400 dark:text-gray-500 mb-1">이메일</p>
                <p class="text-sm font-medium" th:text="${userInfo.email}">-</p>
            </div>
            <div>
                <p class="text-xs text-gray-400 dark:text-gray-500 mb-1">전화번호</p>
                <p class="text-sm font-medium" th:text="${userInfo.phone}">-</p>
            </div>
        </div>
        <div class="border-t border-gray-100 dark:border-gray-700 pt-5 flex items-center justify-between">
            <div>
                <p class="text-xs text-gray-400 dark:text-gray-500 mb-1">예치금 잔액</p>
                <p class="text-3xl font-bold"
                   th:text="'₩' + ${#numbers.formatDecimal(userInfo.deposit, 0, 'COMMA', 0, 'POINT')}">₩0</p>
            </div>
            <a href="/deposit/charge"
               class="px-5 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-black font-bold rounded-lg text-sm hover:bg-gray-700 dark:hover:bg-gray-200 transition-colors">
                충전하기
            </a>
        </div>
    </div>

    <!-- 예치금 충전/사용 내역 -->
    <div class="mb-10">
        <h2 class="text-lg font-bold mb-4">예치금 내역</h2>

        <div th:if="${depositHistoriesError}" class="bg-red-50 dark:bg-red-900/30 border border-red-300 dark:border-red-800 text-red-700 dark:text-red-400 px-4 py-3 rounded-lg text-sm"
             th:text="${depositHistoriesError}"></div>

        <div th:if="${depositHistories != null and #lists.isEmpty(depositHistories)}"
             class="bg-white dark:bg-[#1e1e1e] border border-gray-200 dark:border-gray-800 rounded-2xl p-8 text-center text-gray-400 dark:text-gray-500 text-sm">
            예치금 내역이 없습니다.
        </div>

        <div th:if="${depositHistories != null and not #lists.isEmpty(depositHistories)}" class="space-y-2">
            <div th:each="item : ${depositHistories}"
                 class="bg-white dark:bg-[#1e1e1e] border border-gray-200 dark:border-gray-800 rounded-xl px-5 py-4 flex items-center justify-between">
                <div class="flex flex-col gap-1">
                <span th:switch="${item.type}">
                    <span th:case="'CHARGE'" class="inline-flex items-center gap-1.5 text-sm font-medium text-green-600 dark:text-green-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        충전
                    </span>
                    <span th:case="'USE'" class="inline-flex items-center gap-1.5 text-sm font-medium text-red-600 dark:text-red-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                        사용
                    </span>
                    <span th:case="'REFUND'" class="inline-flex items-center gap-1.5 text-sm font-medium text-blue-600 dark:text-blue-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                        환불
                    </span>
                    <span th:case="*" class="text-sm font-medium text-gray-500 dark:text-gray-400" th:text="${item.type}">-</span>
                </span>
                <span th:if="${item.createdAt != null}" class="text-xs text-gray-400 dark:text-gray-600"
                      th:text="${#strings.substring(item.createdAt, 0, 16).replace('T', ' ')}">-</span>
                </div>
                <span th:switch="${item.type}">
                    <span th:case="'CHARGE'" class="text-base font-bold text-green-600 dark:text-green-400"
                          th:text="'+₩' + ${#numbers.formatDecimal(item.amount, 0, 'COMMA', 0, 'POINT')}">-</span>
                    <span th:case="'USE'" class="text-base font-bold text-red-600 dark:text-red-400"
                          th:text="'-₩' + ${#numbers.formatDecimal(item.amount, 0, 'COMMA', 0, 'POINT')}">-</span>
                    <span th:case="'REFUND'" class="text-base font-bold text-blue-600 dark:text-blue-400"
                          th:text="'+₩' + ${#numbers.formatDecimal(item.amount, 0, 'COMMA', 0, 'POINT')}">-</span>
                    <span th:case="*" class="text-base font-bold text-gray-700 dark:text-gray-300"
                          th:text="'₩' + ${#numbers.formatDecimal(item.amount, 0, 'COMMA', 0, 'POINT')}">-</span>
                </span>
            </div>
        </div>
    </div>

    <!-- 주문 내역 -->
    <div>
        <h2 class="text-lg font-bold mb-4">주문 내역</h2>

        <div th:if="${ordersError}" class="bg-red-50 dark:bg-red-900/30 border border-red-300 dark:border-red-800 text-red-700 dark:text-red-400 px-4 py-3 rounded-lg text-sm"
             th:text="${ordersError}"></div>

        <div th:if="${orders != null and #lists.isEmpty(orders)}"
             class="bg-white dark:bg-[#1e1e1e] border border-gray-200 dark:border-gray-800 rounded-2xl p-8 text-center text-gray-400 dark:text-gray-500 text-sm">
            주문 내역이 없습니다.
        </div>

        <div th:if="${orders != null and not #lists.isEmpty(orders)}" class="space-y-3">
            <div th:each="order : ${orders}"
                 class="bg-white dark:bg-[#1e1e1e] border border-gray-200 dark:border-gray-800 rounded-2xl p-5 flex items-center justify-between">
                <div class="space-y-1">
                    <p class="text-xs text-gray-400 dark:text-gray-500">주문 ID</p>
                    <p class="text-sm font-mono text-gray-600 dark:text-gray-300" th:text="${#strings.substring(order.id.toString(), 0, 8) + '...'}">-</p>
                    <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">수량 <span class="text-gray-900 dark:text-white font-medium" th:text="${order.quantity + '명'}"></span></p>
                </div>
                <div class="text-right space-y-2">
                    <p class="text-lg font-bold"
                       th:text="'₩' + ${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}">-</p>
                    <span th:switch="${order.status}">
                        <span th:case="'PENDING'" class="inline-block px-2 py-1 bg-yellow-50 dark:bg-yellow-900/40 border border-yellow-300 dark:border-yellow-700 text-yellow-700 dark:text-yellow-400 rounded text-xs">결제 대기</span>
                        <span th:case="'PAID'" class="inline-block px-2 py-1 bg-green-50 dark:bg-green-900/40 border border-green-300 dark:border-green-700 text-green-700 dark:text-green-400 rounded text-xs">결제 완료</span>
                        <span th:case="'FAILED'" class="inline-block px-2 py-1 bg-red-50 dark:bg-red-900/40 border border-red-300 dark:border-red-700 text-red-700 dark:text-red-400 rounded text-xs">결제 실패</span>
                        <span th:case="'CANCELED'" class="inline-block px-2 py-1 bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 rounded text-xs">취소됨</span>
                        <span th:case="*" class="inline-block px-2 py-1 bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 rounded text-xs" th:text="${order.status}">-</span>
                    </span>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
